<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SAC 训练过程模拟器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
/* ── CSS Variables ── */
:root {
  --bg-primary:   #ffffff;
  --bg-secondary: #f5f5f4;
  --bg-info:      #eff6ff;
  --bg-danger:    #fef2f2;
  --text-primary:   #1a1a18;
  --text-secondary: #6b6b68;
  --text-tertiary:  #9a9a96;
  --text-info:      #1d4ed8;
  --text-danger:    #dc2626;
  --border-primary:   #e2e2df;
  --border-secondary: #e2e2df;
  --border-tertiary:  #eeede9;
  --border-info:      #bfdbfe;
  --border-danger:    #fecaca;
  --radius-md: 8px;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
  --font-sans: system-ui, -apple-system, 'Helvetica Neue', sans-serif;

  /* Map to names the snippet uses */
  --color-background-primary:   var(--bg-primary);
  --color-background-secondary: var(--bg-secondary);
  --color-background-info:      var(--bg-info);
  --color-background-danger:    var(--bg-danger);
  --color-text-primary:         var(--text-primary);
  --color-text-secondary:       var(--text-secondary);
  --color-text-tertiary:        var(--text-tertiary);
  --color-text-info:            var(--text-info);
  --color-text-danger:          var(--text-danger);
  --color-border-primary:       var(--border-primary);
  --color-border-secondary:     var(--border-secondary);
  --color-border-tertiary:      var(--border-tertiary);
  --color-border-info:          var(--border-info);
  --color-border-danger:        var(--border-danger);
  --border-radius-md: var(--radius-md);
  --font-mono: var(--font-mono);
  --font-sans: var(--font-sans);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary:   #1c1b19;
    --bg-secondary: #252421;
    --bg-info:      #1e3a5f;
    --bg-danger:    #450a0a;
    --text-primary:   #e8e7e3;
    --text-secondary: #9a9890;
    --text-tertiary:  #6b6a66;
    --text-info:      #93c5fd;
    --text-danger:    #f87171;
    --border-primary:   #333230;
    --border-secondary: #333230;
    --border-tertiary:  #2a2927;
    --border-info:      #1e40af;
    --border-danger:    #991b1b;
  }
}

/* ── Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: var(--font-sans);
  background: var(--bg-secondary);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* ── Page chrome ── */
.page-header {
  padding: 14px 16px 0;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 6px 0;
  margin-bottom: 4px;
}
.back-btn:hover { color: var(--text-primary); }

.page-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.page-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 0;
}

.container {
  padding: 10px 14px 40px;
}

/* ── sr-only ── */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

/* ── Original snippet styles (lightly adjusted for mobile) ── */
.ctrl {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.btn {
  padding: 8px 16px;
  border-radius: var(--radius-md);
  border: 0.5px solid var(--border-secondary);
  font-size: 13px;
  cursor: pointer;
  background: var(--bg-primary);
  color: var(--text-primary);
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn:hover, .btn:active { background: var(--bg-secondary); }

.sl-grp {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-secondary);
}

/* Larger touch target for sliders on mobile */
.sl-grp input[type="range"] {
  width: 72px;
  height: 36px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}

/* 2-column on narrow screens */
@media (max-width: 480px) {
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

.pnl {
  border: 0.5px solid var(--border-tertiary);
  border-radius: var(--radius-md);
  padding: 10px 11px;
  background: var(--bg-primary);
}

.pname {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: 2px;
}

.pval {
  font-size: 19px;
  font-weight: 500;
  font-family: var(--font-mono);
  margin-bottom: 6px;
  line-height: 1;
  color: var(--text-primary);
}

.pval span {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-tertiary);
  margin-left: 4px;
  font-family: var(--font-sans);
}

canvas { display: block; width: 100%; height: 58px; }

.step-disp {
  font-size: 13px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  min-width: 96px;
}
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-btn">← 返回</a>
  <div class="page-title">SAC 训练过程模拟器</div>
  <div class="page-subtitle">Soft Actor-Critic · 六项关键指标实时动态</div>
</div>

<div class="container">

<h2 class="sr-only">SAC训练过程参数动态模拟器，展示六项关键指标的实时变化</h2>

<div style="padding:.25rem 0">
<div class="ctrl">
  <button class="btn" id="playBtn" onclick="togglePlay()" style="min-width:76px">
    <i class="ti ti-player-play" style="font-size:13px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>开始
  </button>
  <button class="btn" onclick="doReset()">
    <i class="ti ti-refresh" style="font-size:13px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>重置
  </button>
  <span class="step-disp" id="stepDisp">step: 0</span>
  <div class="sl-grp">
    速度
    <input type="range" min="1" max="30" value="6" id="spd"
      oninput="document.getElementById('spdV').textContent=this.value">
    <span id="spdV" style="min-width:18px">6</span>×
  </div>
  <div class="sl-grp">
    目标熵 H̄
    <input type="range" min="-12" max="-1" value="-6" step="1" id="he"
      oninput="onHeChange(this.value)">
    <span id="heV" style="min-width:26px">−6</span>
  </div>
</div>

<div class="grid">
  <div class="pnl" id="pnl0">
    <div class="pname">episode reward</div>
    <div class="pval" id="v0">—</div>
    <canvas id="c0"></canvas>
  </div>
  <div class="pnl" id="pnl1">
    <div class="pname">critic loss J<sub>Q</sub></div>
    <div class="pval" id="v1">—</div>
    <canvas id="c1"></canvas>
  </div>
  <div class="pnl" id="pnl2">
    <div class="pname">actor loss J<sub>π</sub></div>
    <div class="pval" id="v2">—</div>
    <canvas id="c2"></canvas>
  </div>
  <div class="pnl" id="pnl3">
    <div class="pname">policy entropy H(π)</div>
    <div class="pval" id="v3">—<span id="heTarget"></span></div>
    <canvas id="c3"></canvas>
  </div>
  <div class="pnl" id="pnl4">
    <div class="pname">temperature α</div>
    <div class="pval" id="v4">—</div>
    <canvas id="c4"></canvas>
  </div>
  <div class="pnl" id="pnl5">
    <div class="pname">mean Q value</div>
    <div class="pval" id="v5">—</div>
    <canvas id="c5"></canvas>
  </div>
</div>
</div>

</div><!-- /container -->

<script>
const COLORS = ['#1D9E75','#D85A30','#7F77DD','#378ADD','#EF9F27','#639922'];
const BUFLEN = 260;

let bufs = Array.from({length:6},()=>[]);
let step=0, log_alpha=Math.log(0.2), entropy=3.0, reward=-26, q_mean=-8;
let playing=false, animId=null, lastTs=0, frameAcc=0;

function n(s=1){return(Math.random()-0.5)*2*s}

function getHe(){return parseInt(document.getElementById('he').value)}
function getSpd(){return parseInt(document.getElementById('spd').value)}

function onHeChange(v){
  document.getElementById('heV').textContent='−'+Math.abs(v);
  document.getElementById('heTarget').textContent=' (H̄='+v+')';
}

function doStep(){
  step++;
  const t=step;
  const H=getHe();

  const grad=-(entropy-H);
  log_alpha+=3e-3*grad+n(0.012);
  log_alpha=Math.max(-5,Math.min(2.5,log_alpha));
  const alpha=Math.exp(log_alpha);

  const nat_e=H+3.5*Math.exp(-t/600);
  entropy+=0.01*(nat_e-entropy)+n(0.09);

  const q_loss=Math.max(0.04,28*Math.exp(-t/700)+0.35+Math.abs(n(1.8)));

  const qTarget=-4+18*(1-Math.exp(-t/900));
  q_mean+=0.018*(qTarget-q_mean)+n(0.22);

  reward=-26+24/(1+Math.exp(-0.007*(t-450)))+n(1.4);

  const actor_loss=-(0.25+3.0*(1-Math.exp(-t/650)))+n(0.22);

  const vals=[reward,q_loss,actor_loss,entropy,alpha,q_mean];
  vals.forEach((v,i)=>{
    bufs[i].push(v);
    if(bufs[i].length>BUFLEN)bufs[i].shift();
  });
  return vals;
}

function drawSparkline(idx,color,targetVal){
  const cv=document.getElementById('c'+idx);
  const buf=bufs[idx];
  if(!cv||buf.length<2)return;
  const dpr=devicePixelRatio||1;
  const W=cv.clientWidth,H=cv.clientHeight;
  if(cv.width!==W*dpr||cv.height!==H*dpr){cv.width=W*dpr;cv.height=H*dpr;}
  const ctx=cv.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const mn=Math.min(...buf),mx=Math.max(...buf);
  const pad=Math.max(Math.abs(mx-mn)*0.12,0.4);
  const lo=mn-pad,hi=mx+pad;
  const tx=(k)=>k/(buf.length-1)*(W-2)+1;
  const ty=(v)=>H-0.05*H-(v-lo)/(hi-lo)*H*0.9;

  if(targetVal!==undefined){
    const ty0=ty(targetVal);
    if(ty0>0&&ty0<H){
      ctx.save();
      ctx.strokeStyle=color+'50';
      ctx.lineWidth=1;
      ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(0,ty0);ctx.lineTo(W,ty0);ctx.stroke();
      ctx.restore();
    }
  }

  ctx.beginPath();
  ctx.moveTo(tx(0),ty(buf[0]));
  for(let k=1;k<buf.length;k++)ctx.lineTo(tx(k),ty(buf[k]));
  ctx.lineTo(tx(buf.length-1),H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fillStyle=color+'15';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(tx(0),ty(buf[0]));
  for(let k=1;k<buf.length;k++)ctx.lineTo(tx(k),ty(buf[k]));
  ctx.strokeStyle=color;
  ctx.lineWidth=1.5;
  ctx.lineJoin='round';
  ctx.setLineDash([]);
  ctx.stroke();
}

function fmt(v,i){
  if(i===0)return v.toFixed(1);
  if(i===1)return v.toFixed(3);
  if(i===2)return v.toFixed(3);
  if(i===3)return v.toFixed(2);
  if(i===4)return v.toFixed(4);
  if(i===5)return v.toFixed(2);
}

function renderFrame(ts){
  if(!playing)return;
  const dt=ts-lastTs;lastTs=ts;
  frameAcc+=dt;
  const interval=1000/25;
  if(frameAcc>=interval){
    frameAcc-=interval;
    const spd=getSpd();
    let vals;
    for(let k=0;k<spd;k++)vals=doStep();
    vals.forEach((v,i)=>document.getElementById('v'+i).textContent=fmt(v,i));
    document.getElementById('stepDisp').textContent='step: '+step.toLocaleString();
    const He=getHe();
    for(let i=0;i<6;i++)drawSparkline(i,COLORS[i],i===3?He:undefined);
  }
  animId=requestAnimationFrame(renderFrame);
}

function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('playBtn');
  if(playing){
    btn.innerHTML='<i class="ti ti-player-pause" style="font-size:13px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>暂停';
    lastTs=performance.now();frameAcc=0;
    animId=requestAnimationFrame(renderFrame);
  }else{
    btn.innerHTML='<i class="ti ti-player-play" style="font-size:13px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>继续';
    if(animId)cancelAnimationFrame(animId);
  }
}

function doReset(){
  playing=false;
  if(animId)cancelAnimationFrame(animId);
  document.getElementById('playBtn').innerHTML='<i class="ti ti-player-play" style="font-size:13px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>开始';
  bufs=Array.from({length:6},()=>[]);
  step=0;log_alpha=Math.log(0.2);entropy=3.0;reward=-26;q_mean=-8;
  document.getElementById('stepDisp').textContent='step: 0';
  for(let i=0;i<6;i++){
    document.getElementById('v'+i).textContent='—';
    const cv=document.getElementById('c'+i);
    if(cv){const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);}
  }
}

onHeChange(document.getElementById('he').value);
</script>
</body>
</html>
